name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (UI → server, verifies mcp-app.html copy)
        run: pnpm build

      - name: Verify UI HTML is bundled
        run: test -f apps/mcp-datadog-logs/dist/mcp-app.html

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
